<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizlish - Dashboard</title>
    <meta name="description" content="View your completed grammar tests, average scores, and tracking history on the Quizlish portal.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        
        body { font-family: 'Outfit', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-[#f0f9ff] via-white to-[#ecfdf5] dark:from-slate-900 dark:via-slate-900 dark:to-slate-800 text-slate-800 dark:text-slate-100 flex flex-col min-h-screen relative overflow-x-hidden transition-colors duration-300">
    
    <header class="shrink-0 bg-white/70 dark:bg-slate-900/80 backdrop-blur-md z-30 sticky top-0 border-b border-slate-100 dark:border-slate-800 shadow-[0_4px_30px_rgb(0,0,0,0.03)] transition-colors duration-300"></header>

    <main class="flex-1 min-h-0 w-full max-w-6xl mx-auto p-4 md:p-8 flex flex-col justify-center">
        <!-- Profile / Dashboard Screen -->
        <div id="profile-screen" class="app-screen w-full flex flex-col gap-8 py-8 lg:py-12">
            <div class="bg-white dark:bg-slate-800 rounded-[2rem] md:rounded-[2.5rem] p-5 md:p-10 shadow-xl border border-slate-100 dark:border-slate-700 text-left">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 pb-6 border-b border-slate-100 dark:border-slate-700">
                    <div class="flex items-center gap-4">
                        <div id="profile-avatar" class="w-16 h-16 rounded-full bg-blue-600 text-white flex items-center justify-center font-black text-3xl shadow-[0_8px_20px_rgba(37,99,235,0.3)]">U</div>
                        <div>
                            <h2 id="profile-user-name" class="text-3xl font-black text-slate-900 dark:text-white">User Name</h2>
                            <p id="profile-user-email" class="text-slate-500 dark:text-slate-400 font-bold text-sm">user@example.com</p>
                        </div>
                    </div>
                    <button onclick="handleSignOut();" class="px-6 py-3 rounded-2xl font-bold bg-rose-50 hover:bg-rose-100 text-rose-600 dark:bg-rose-950/30 dark:hover:bg-rose-900/40 dark:text-rose-400 transition-colors self-start md:self-center">Sign Out</button>
                </div>

                <!-- Stats Grid -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 my-8">
                    <div class="bg-blue-50/50 dark:bg-slate-700/50 p-6 rounded-3xl border border-blue-100 dark:border-slate-600 shadow-sm flex flex-col">
                        <span class="text-[10px] uppercase tracking-widest text-blue-600 dark:text-blue-400 font-black mb-2">Tests Completed</span>
                        <span id="stats-tests-count" class="text-5xl font-black text-slate-900 dark:text-white">0</span>
                    </div>
                    <div class="bg-emerald-50/50 dark:bg-slate-700/50 p-6 rounded-3xl border border-emerald-100 dark:border-slate-600 shadow-sm flex flex-col">
                        <span class="text-[10px] uppercase tracking-widest text-emerald-600 dark:text-emerald-400 font-black mb-2">Average Score</span>
                        <span id="stats-average-score" class="text-5xl font-black text-slate-900 dark:text-white">0%</span>
                    </div>
                    <div class="bg-purple-50/50 dark:bg-slate-700/50 p-6 rounded-3xl border border-purple-100 dark:border-slate-600 shadow-sm flex flex-col">
                        <span class="text-[10px] uppercase tracking-widest text-purple-600 dark:text-purple-400 font-black mb-2">Highest Score</span>
                        <span id="stats-highest-score" class="text-5xl font-black text-slate-900 dark:text-white">0</span>
                    </div>
                </div>

                <!-- Recent Activity Table -->
                <h3 class="text-2xl font-black text-slate-900 dark:text-white mb-6">Recent Test Scores</h3>
                <div class="overflow-x-auto no-scrollbar rounded-2xl border border-slate-100 dark:border-slate-700">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 dark:bg-slate-900 border-b border-slate-100 dark:border-slate-700">
                                <th class="p-4 font-black text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wider">Test/Quiz</th>
                                <th class="p-4 font-black text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wider">Category</th>
                                <th class="p-4 font-black text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wider">Score</th>
                                <th class="p-4 font-black text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wider">Date</th>
                            </tr>
                        </thead>
                        <tbody id="scores-table-body">
                            <!-- Rows rendered dynamically -->
                        </tbody>
                    </table>
                    <div id="no-scores-message" class="text-center py-10 text-slate-400 dark:text-slate-500 font-bold hidden">
                        No tests completed yet. Take a test to view your progress!
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="shrink-0 w-full bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 py-8 relative z-20 mt-auto"></footer>

    <script src="js/shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Load scores when page starts and when auth state becomes ready
            window.addEventListener('auth-changed', (e) => {
                const user = e.detail;
                if (!user) {
                    // Redirect to home if logged out
                    window.location.href = 'index.html';
                    return;
                }
                loadProfileStats(user);
            });
            
            // Timeout safety check in case auth state is already loaded
            setTimeout(() => {
                const user = getLoggedInUser();
                if (user) loadProfileStats(user);
            }, 500);
        });

        const categoryNames = {
            prepositions: "Prepositions", tenses: "Tenses", adjectives: "Adjectives", adverbs: "Adverbs", conjunctions: "Conjunctions",
            comprehension: "Comprehension", voice: "Voice Change", narration: "Narration Change", joining: "Joining", transformation: "Transformation", full_tests: "Full Length Tests"
        };

        async function loadProfileStats(user) {
            if (!user) return;

            document.getElementById('profile-user-name').innerText = user.name;
            document.getElementById('profile-user-email').innerText = user.email;
            document.getElementById('profile-avatar').innerText = user.name.charAt(0).toUpperCase();

            const scoresTableBody = document.getElementById('scores-table-body');
            const noScoresMsg = document.getElementById('no-scores-message');
            scoresTableBody.innerHTML = '';

            let data = [];
            // A. Fetch from Supabase
            if (supabaseClient) {
                try {
                    const { data: dbData, error } = await supabaseClient
                        .from('quiz_scores')
                        .select('*')
                        .eq('email', user.email)
                        .order('created_at', { ascending: false });
                    if (!error && dbData) {
                        data = dbData;
                    }
                } catch (err) {
                    console.warn("Supabase fetch failed, falling back to localStorage:", err);
                }
            }

            // B. Fetch from LocalStorage
            let localData = [];
            try {
                localData = JSON.parse(localStorage.getItem(`quizlish_scores_${user.email}`) || '[]');
            } catch (e) {
                console.warn("Failed to read local scores:", e);
            }

            // C. Merge and De-duplicate
            const seen = new Set();
            const merged = [];

            // Add DB scores first
            data.forEach(row => {
                const key = `${row.category}_${row.quiz_name}_${row.score}_${row.total}`;
                seen.add(key);
                merged.push(row);
            });

            // Add local scores if not already in DB
            localData.forEach(row => {
                const key = `${row.category}_${row.quiz_name}_${row.score}_${row.total}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    merged.push(row);
                }
            });

            // Sort merged scores by created_at descending
            merged.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            if (merged.length === 0) {
                noScoresMsg.classList.remove('hidden');
                document.getElementById('stats-tests-count').innerText = '0';
                document.getElementById('stats-average-score').innerText = '0%';
                document.getElementById('stats-highest-score').innerText = '0';
                return;
            }

            noScoresMsg.classList.add('hidden');
            document.getElementById('stats-tests-count').innerText = merged.length;

            let totalScoreSum = 0;
            let highestScore = 0;

            merged.forEach(row => {
                totalScoreSum += (row.score / row.total);
                if (row.score > highestScore) highestScore = row.score;

                const date = new Date(row.created_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-50 dark:border-slate-750 hover:bg-slate-50/50 dark:hover:bg-slate-700/30 transition-colors";
                tr.innerHTML = `
                    <td class="p-4 font-bold text-slate-800 dark:text-slate-200">${row.quiz_name}</td>
                    <td class="p-4 font-semibold text-slate-500 dark:text-slate-400">${categoryNames[row.category] || row.category}</td>
                    <td class="p-4 font-black text-blue-600 dark:text-blue-400">${row.score} / ${row.total}</td>
                    <td class="p-4 font-semibold text-slate-400">${date}</td>
                `;
                scoresTableBody.appendChild(tr);
            });

            const average = Math.round((totalScoreSum / merged.length) * 100);
            document.getElementById('stats-average-score').innerText = `${average}%`;
            document.getElementById('stats-highest-score').innerText = highestScore;
        }
    </script>
</body>
</html>
